name: Build MacOS Executable with PyInstaller

on:
  workflow_dispatch

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write # Grants write access to repository contents for this job only
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12' # Specify your desired Python version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller requests
          # If you have a requirements.txt file:
          # Install requirements later, as may make binary smaller
          #pip install -r requirements.txt

      # Do this first, as has less dependencies
      - name: Package BrowseApplication with PyInstaller
        run: |
          # Replace 'your_script.py' with your main Python script or 'your_app.spec' if using a spec file
          pyinstaller --windowed BrowseRoyalCaribbeanPrice.py

      - name: upload windows artifact
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: /Users/runner/work/CheckRoyalCaribbeanPrice/CheckRoyalCaribbeanPrice/dist/BrowseRoyalCaribbeanPrice.app
          asset_name: BrowseRoyalCaribbeanPrice.app
          asset_content_type: application/octet-stream
      
      - name: Package Application with PyInstaller
        run: |
          # Replace 'your_script.py' with your main Python script or 'your_app.spec' if using a spec file
          pip install Apprise bs4
          pyinstaller --windowed --collect-all apprise --collect-all bs4 CheckRoyalCaribbeanPrice.py

      - name: upload windows artifact
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: /Users/runner/work/CheckRoyalCaribbeanPrice/CheckRoyalCaribbeanPrice/dist/CheckRoyalCaribbeanPrice.app
          asset_name: CheckRoyalCaribbeanPrice.app
          asset_content_type: application/octet-stream
    
